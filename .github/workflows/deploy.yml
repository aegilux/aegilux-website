name: Build and Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  S3_BUCKET: infoarchitect.com.au
  S3_KEY: deployments/aegilux-website/dist.tar.gz
  EC2_INSTANCE_ID: i-03ba65de43ace738f
  DEPLOY_PATH: /var/www/aegilux

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GA4_MEASUREMENT_ID: ${{ secrets.VITE_GA4_MEASUREMENT_ID }}
          VITE_FORM_ENDPOINT: ${{ secrets.VITE_FORM_ENDPOINT }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload build to S3
        run: |
          tar -czf dist.tar.gz -C dist .
          aws s3 cp dist.tar.gz s3://$S3_BUCKET/$S3_KEY
          echo "Uploaded build artifact to s3://$S3_BUCKET/$S3_KEY"

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy aegilux-website ${{ github.sha }}" \
            --parameters 'commands=[
              "set -e",
              "echo \"Deploying aegilux-website commit ${{ github.sha }}...\"",
              "sudo mkdir -p /var/www/aegilux",
              "sudo chown apache:apache /var/www/aegilux",
              "aws s3 cp s3://infoarchitect.com.au/deployments/aegilux-website/dist.tar.gz /tmp/aegilux-dist.tar.gz",
              "sudo rm -rf /var/www/aegilux/*",
              "sudo tar -xzf /tmp/aegilux-dist.tar.gz -C /var/www/aegilux/",
              "sudo chown -R apache:apache /var/www/aegilux",
              "rm -f /tmp/aegilux-dist.tar.gz",
              "echo \"Deploy complete at $(date). Files:\"",
              "ls -la /var/www/aegilux/"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "Waiting for deployment to complete..."

          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: Status=$STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful."
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query 'StandardOutputContent' \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query '[StandardOutputContent, StandardErrorContent]' \
                --output text
              exit 1
            fi
          done

          echo "Deployment did not complete within 60 seconds. Check SSM console."
          exit 1
